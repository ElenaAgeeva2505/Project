<router-outlet></router-outlet>
<div class="container d-flex p-3">
    <button (click)="notiflix_alert('warning')">Notify Warning</button>
    <button (click)="notiflix_alert('success')">Notify Success</button>
    <button (click)="notiflix_alert('error')">Notify Error</button>
    <button (click)="notiflix_alert('info')">Notify Info</button>
  </div>
  
  <div class="container p-3">
    <div *ngFor="let alert of alerts">
      <alert
        [type]="alert.type"
        [dismissible]="dismissible"
        (onClosed)="onClosed(alert)"
        >{{ alert.msg }}</alert
      >
    </div>
    <button
      type="button"
      class="btn btn-primary"
      (click)="dismissible = !dismissible"
    >
      Toggle dismissible
    </button>
    <button type="button" class="btn btn-primary" (click)="reset()">Reset</button>
  </div>
  
  <div class="p-7">
    <ngx-charts-bar-vertical
      [results]="charts_data"
      [view]="[700, 400]"
      [legend]="true"
      [roundDomains]="true"
    ></ngx-charts-bar-vertical>
  </div>
